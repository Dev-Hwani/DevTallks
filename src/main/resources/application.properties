spring.application.name=DevTallks

# ==============================
# 🔧 Server 기본 설정
# ==============================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


# ==============================
# 📌 MySQL 설정
# ==============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/devtallks?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=비밀번호입력


# ==============================
# 📌 JPA 설정
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.open-in-view=false


# ==============================
# 📌 Redis 설정
# ==============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=6000


# ==============================
# 🔐 JWT 설정
# ==============================
jwt.secret-key=ril2FtqskRZ/ZsIM+4c8d7IiKQGbhUyBUCypobUyAgYwbqPZgTNjeAEoj5qh/xY6G0sUmSIBJvr0gQzTv8uA/g==
jwt.access-token-expire=1800000           
jwt.refresh-token-expire=1209600000       


# ==============================
# 📄 Swagger / SpringDoc 설정
# ==============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html


# ==============================
# 📦 Multipart 파일 업로드
# ==============================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB


# ==============================
# 🔁 WebSocket
# ==============================
spring.websocket.enabled=true


# ==============================
# 🧪 Test 설정
# ==============================
spring.test.database.replace=NONE


# ==============================
# 🪵 Logging
# ==============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ==============================
# 📦 파일 업로드
# ==============================
file.upload-dir=/uploads                        # 로컬 업로드 경로
file.max-file-size=20971520                     # 20MB (바이트 단위)
file.allowed-extensions=jpg,png,gif,mp4,pdf    	# 허용 확장자


# ==============================
# ☁ AWS S3
# ==============================
cloud.aws.credentials.access-key=YOUR_AWS_ACCESS_KEY
cloud.aws.credentials.secret-key=YOUR_AWS_SECRET_KEY
cloud.aws.region.static=ap-northeast-2         
cloud.aws.s3.bucket=devtallks-bucket           
